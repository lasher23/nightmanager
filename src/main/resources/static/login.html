<!DOCTYPE html>
<html lang="de" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightmanager – Login</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">

<div class="card w-full max-w-sm bg-base-100 shadow-xl">
    <div class="card-body">
        <h1 class="text-2xl font-bold text-center">🏑 Nightmanager</h1>
        <p class="text-center text-base-content/60 text-sm mb-4">Login mit E-Mail</p>

        <!-- Error alert (hidden by default, shown via URL param) -->
        <div id="errorAlert" class="alert alert-error text-sm hidden">
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none"
                 viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Ungültiger oder abgelaufener Code. Bitte versuche es erneut.</span>
        </div>

        <!-- Step 1: Enter email -->
        <div id="emailStep">
            <div class="form-control w-full">
                <label class="label" for="email">
                    <span class="label-text">E-Mail</span>
                </label>
                <input type="email" id="email" placeholder="deine@email.com" autocomplete="email" required
                       class="input input-bordered w-full"/>
            </div>
            <button id="sendCodeBtn" class="btn btn-primary w-full mt-4" onclick="sendCode()">
                Code senden
            </button>
        </div>

        <!-- Step 2: Enter verification code -->
        <div id="codeStep" class="hidden">
            <div class="alert alert-success text-sm mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="successMsg">Ein Bestätigungscode wurde an deine E-Mail gesendet.</span>
            </div>

            <form action="/login" method="POST">
                <input type="hidden" name="email" id="emailHidden">
                <div class="form-control w-full">
                    <label class="label" for="code">
                        <span class="label-text">Bestätigungscode</span>
                    </label>
                    <input type="text" name="code" id="code" placeholder="123456"
                           autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" required
                           class="input input-bordered w-full text-center tracking-[0.5em] text-lg"/>
                </div>
                <button type="submit" id="verifyBtn" class="btn btn-primary w-full mt-4">
                    Einloggen
                </button>
            </form>

            <button class="btn btn-ghost btn-sm w-full mt-2" onclick="resendCode()">
                Code erneut senden
            </button>
        </div>
    </div>
</div>

<script>
    // Show error alert if ?error is in the URL
    if (new URLSearchParams(window.location.search).has('error')) {
        document.getElementById('errorAlert').classList.remove('hidden');
    }

    function sendCode() {
        const email = document.getElementById('email').value.trim();
        if (!email) return;

        const btn = document.getElementById('sendCodeBtn');
        btn.classList.add('loading');
        btn.disabled = true;

        fetch('/auth/passwordless/send-code', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: email})
        })
            .then(res => res.json())
            .then(() => {
                document.getElementById('emailStep').classList.add('hidden');
                document.getElementById('codeStep').classList.remove('hidden');
                document.getElementById('emailHidden').value = email;
                document.getElementById('errorAlert').classList.add('hidden');
                document.getElementById('code').focus();
            })
            .catch(() => {
                btn.classList.remove('loading');
                btn.disabled = false;
            });
    }

    function resendCode() {
        const email = document.getElementById('emailHidden').value;
        fetch('/auth/passwordless/send-code', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email: email})
        })
            .then(() => {
                document.getElementById('successMsg').textContent = 'Ein neuer Code wurde gesendet!';
            });
    }

    // Allow Enter key on email input
    document.getElementById('email').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendCode();
    });
</script>

</body>
</html>
