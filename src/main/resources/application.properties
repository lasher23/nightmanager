spring.datasource.url=jdbc:postgresql://localhost:5432/nightmanager
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driverClassName=org.postgresql.Driver
#spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8080
logging.level.root=info
onesignal.app-id=acd8ce34-dd03-467d-8745-153dbf05a0d3

# ===== OIDC Authorization Server =====
nightmanager.auth.issuer-url=http://localhost:8080
nightmanager.auth.client.redirect-uris=http://localhost:8080/oidc/callback,http://localhost:4200/oidc/callback
nightmanager.auth.client.post-logout-redirect-uris=http://localhost:8080,http://localhost:4200
nightmanager.auth.cors.allowed-origins=http://localhost:8080,http://localhost:4200
nightmanager.auth.default-admin-email=admin@nightmanager.ch
# Directory where the RSA signing key PEM files are stored (created if absent)
nightmanager.auth.key-store-dir=./keys

# ===== Microsoft Entra ID (Social Login) =====
# Set these via environment variables or application-local.properties (never commit secrets)
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/microsoft
spring.security.oauth2.client.provider.microsoft.issuer-uri=${MICROSOFT_ISSUER_URI}
