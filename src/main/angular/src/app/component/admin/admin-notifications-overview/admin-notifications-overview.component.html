<div class="admin-notifications">
  <div class="mb-6">
    <button class="btn btn-primary" (click)="loadData()">Reload</button>
  </div>

  <div class="overflow-x-auto">
    <table class="table table-compact w-full">
      <thead>
        <tr class="bg-base-300">
          <th>Text</th>
          <th>Nummer</th>
          <th>Zeitpunkt</th>
          <th class="text-center">Erfolg</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody>
        @for (element of notifications | async; track element.id) {
          <tr class="hover" [class.opacity-50]="element.success">
            <td class="text-sm">{{ element.text | slice:0:30 }}...</td>
            <td>{{ element.toNumber }}</td>
            <td class="text-sm">{{ element.sentTime | date: 'HH:mm:ss' }}</td>
            <td class="text-center">
              <span [class.badge]="element.success" [class.badge-success]="element.success">
                {{ element.success ? '✓' : '✗' }}
              </span>
            </td>
            <td>
              <button class="btn btn-xs btn-ghost" (click)="retry(element)" [disabled]="element.success" title="Retry">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
